<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aurelius Fire & Rescue — Incident Report</title>

  <!-- Home-screen icon (iOS "Add to Home Screen") -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="76x76" href="icons/icon-76.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AFR Report">

  <!-- Browser tab / favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <!-- Android / Chrome "Add to Home Screen" -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b0000">
  <meta name="mobile-web-app-capable" content="yes">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5ede0; min-height: 100vh; }
    button { cursor: pointer; font-family: Georgia, serif; }
    input, select, textarea { font-family: Georgia, serif; }

    /* ── Header ── */
    #app-header {
      background: linear-gradient(135deg, #8b0000 0%, #5a0000 100%);
      color: #fff;
      padding: 13px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    #header-eyebrow { font-size: 10px; letter-spacing: 0.15em; opacity: 0.7; text-transform: uppercase; }
    #header-title   { font-size: 18px; font-weight: 700; }
    #header-sub     { font-size: 11px; opacity: 0.65; margin-bottom: 7px; }
    #tab-bar {
      display: flex;
      overflow-x: auto;
      margin: 0 -16px;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none;
      border: none;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #ffcc00; }

    /* ── Content ── */
    #content { padding: 14px; max-width: 640px; margin: 0 auto; }
    #tab-content { margin-top: 14px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      border: 1.5px solid #e0c9a6;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .card-title {
      background: #8b0000;
      color: #fff;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .card-body { padding: 13px 13px 10px; }

    /* ── Form fields ── */
    .lbl {
      font-size: 11px;
      font-weight: 700;
      color: #8b0000;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .inp, .sel, .ta {
      width: 100%;
      box-sizing: border-box;
      background: #fff8f0;
      border: 1.5px solid #c8a97a;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 15px;
      color: #1a1a1a;
      outline: none;
      font-family: Georgia, serif;
      display: block;
    }
    .ta { resize: vertical; }
    .field-row { margin-bottom: 10px; }
    .flex-row { display: flex; gap: 10px; }
    .flex-1 { flex: 1; }
    .flex-2 { flex: 2; }

    /* ── Toggle ── */
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5ede0;
      border: 1.5px solid #c8a97a;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 7px;
      transition: all 0.15s;
    }
    .toggle.on { background: #8b0000; border-color: #8b0000; }
    .toggle-box {
      width: 18px; height: 18px;
      border-radius: 4px;
      background: #c8a97a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 900;
      color: transparent;
    }
    .toggle.on .toggle-box { background: #fff; color: #8b0000; }
    .toggle-label { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .toggle-sub   { font-size: 11px; color: #888; }
    .toggle.on .toggle-label { color: #fff; }
    .toggle.on .toggle-sub   { color: #ffcccc; }

    /* ── Nav buttons ── */
    #nav-row { display: flex; gap: 10px; margin-top: 8px; margin-bottom: 20px; }
    .btn-back  { flex:1; background:#fff; color:#8b0000; border:2px solid #8b0000; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; }
    .btn-save  { flex:1; background:#555; color:#fff; border:none; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; transition:background 0.2s; }
    .btn-save.saved { background: #2d6a2d; }
    .btn-next  { flex:1; background:#8b0000; color:#fff; border:none; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; }
    .btn-print { width:100%; height:56px; display:flex; align-items:center; justify-content:center; background:#8b0000; color:#fff; border:none; border-radius:10px; padding:0 12px; font-size:17px; font-weight:700; letter-spacing:0.05em; margin-bottom:10px; text-align:center; line-height:1.2; }
    .btn-clear { width:100%; background:none; color:#aaa; border:1px solid #ddd; border-radius:8px; padding:8px 0; font-size:12px; margin-bottom:30px; }

    /* ════════════════════════════════
       DESKTOP LAYOUT (wide screens)
       Activates only at 900px+; phones are unaffected.
       ════════════════════════════════ */
    @media (min-width: 900px) {
      body { background: #ece1cd; }

      #app-header { padding: 18px 32px 0; }
      #header-eyebrow { font-size: 12px; }
      #header-title   { font-size: 26px; }
      #header-sub     { font-size: 13px; margin-bottom: 10px; }
      #newreport-btn  { font-size: 15px !important; padding: 10px 18px !important; margin-top: 10px !important; }

      /* Tab bar: no scroll needed, space the tabs out */
      #tab-bar { margin: 0 -32px; padding: 0 24px; justify-content: flex-start; }
      .tab-btn { font-size: 14px; padding: 11px 20px; }

      /* Wider centered content column */
      #content { max-width: 1000px; padding: 26px 32px; }
      #tab-content { margin-top: 20px; }

      /* Cards: roomier, two across where they fit */
      .card { margin-bottom: 20px; border-radius: 12px; }
      .card-title { font-size: 14px; padding: 10px 18px; }
      .card-body { padding: 20px 18px 16px; }

      /* Bigger, more comfortable form controls */
      .lbl { font-size: 12px; margin-bottom: 5px; }
      .inp, .sel, .ta { font-size: 16px; padding: 11px 13px; border-radius: 8px; }
      .field-row { margin-bottom: 14px; }
      .flex-row { gap: 16px; }

      /* Toggles a little roomier on desktop */
      .toggle { padding: 11px 15px; }
      .toggle-label { font-size: 15px; }

      /* Nav + action buttons sized for mouse, not full width */
      #nav-row { margin-top: 14px; margin-bottom: 28px; }
      .btn-back, .btn-next { padding: 14px 0; font-size: 17px; }
      .btn-print { height: 60px; font-size: 18px; max-width: 520px; margin-left: auto; margin-right: auto; }
      .btn-clear { max-width: 360px; margin-left: auto; margin-right: auto; }

      /* Hover affordances (desktop has a real cursor) */
      .tab-btn:hover { color: #fff; }
      .toggle:hover { border-color: #8b0000; }
      .btn-print:hover, .btn-next:hover { filter: brightness(1.08); }
      .btn-back:hover { background: #fbeeee; }
    }

    /* ════════════════════════════════
       PRINT FORM — hidden on screen
       ════════════════════════════════ */
    #print-form { display: none; }

    .rpt {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9pt;
      color: #000;
      width: 100%;
      padding: 0.35in;
    }
    .rpt-title {
      font-size: 15pt; font-weight: bold;
      text-align: center; letter-spacing: 0.06em;
      border-bottom: 2px solid #000;
      padding-bottom: 4px; margin-bottom: 8px;
    }
    .rpt table { border-collapse: collapse; width: 100%; margin-bottom: 4px; }
    .rpt td { border: 1px solid #000; padding: 2px 4px; vertical-align: top; font-size: 8.5pt; }
    .rpt .bl { font-weight: bold; font-size: 7.5pt; white-space: nowrap; }
    .rpt .ul { border-bottom: 1px solid #000; display: inline-block; min-height: 13px; padding-bottom: 1px; }
    .rpt .sec-hdr {
      font-weight: bold; font-size: 7.5pt;
      background: #ddd; border: 1px solid #000;
      padding: 2px 5px; border-bottom: none;
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .rpt .chkbox {
      display: inline-block;
      width: 9px; height: 9px;
      border: 1px solid #000;
      text-align: center; line-height: 9px;
      font-size: 8pt; margin-right: 3px; flex-shrink: 0;
      vertical-align: middle;
    }
    .rpt .chkbox.on { background: #000; color: #fff; font-weight: bold; }
    .rpt .disp-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .disp-item {
      flex: 0 0 50%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 8pt;
    }
    .rpt .disp-item.full { flex: 0 0 100%; border-right: none; }
    .rpt .disp-item:nth-child(even) { border-right: none; }
    .rpt .loc-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .loc-item {
      flex: 0 0 25%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 7.5pt;
    }
    .rpt .loc-item:nth-child(4n) { border-right: none; }
    .rpt .pers-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .pers-item {
      flex: 0 0 50%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 8pt;
    }
    .rpt .pers-item:nth-child(even) { border-right: none; }
    .rpt .app-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .app-item {
      flex: 0 0 20%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      font-size: 7.5pt;
    }
    .rpt .app-item:nth-child(5n) { border-right: none; }
    .rpt .remarks-box {
      border: 1px solid #000; min-height: 55pt;
      padding: 4px; font-size: 8.5pt;
      white-space: pre-wrap; margin-bottom: 4px;
    }
    .rpt .footer-row {
      display: flex; justify-content: space-between;
      border-top: 1px solid #000; padding-top: 3px; font-size: 8pt;
      margin-top: 4px;
    }
    .page2 { padding: 0.35in; }
    .page2-title { font-size: 14pt; font-weight: bold; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 4px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     PRINT FORM (hidden on screen, used by html2pdf)
     ══════════════════════════════════════════ -->
<div id="print-form">
  <!-- filled by JS -->
</div>
<div id="share-status" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a4a8a;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-family:Georgia,serif;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.3);text-align:center;max-width:320px;width:90%"></div>

<!-- ══════════════════════════════════════════
     APP UI
     ══════════════════════════════════════════ -->
<div id="app-header">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
    <div>
      <div id="header-eyebrow">Incident Report</div>
      <div id="header-title">Aurelius Fire &amp; Rescue</div>
      <div id="header-sub">Loading…</div>
    </div>
    <button id="newreport-btn" title="Start a new report" onclick="newReport()"
      style="background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.35);
             color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;
             white-space:nowrap;margin-top:6px;flex-shrink:0;font-family:Georgia,serif">
      ➕ New Report
    </button>
  </div>
  <div id="tab-bar"></div>
</div>

<div id="content">
  <div id="tab-content"></div>
  <div id="nav-row"></div>
  <button class="btn-clear" onclick="clearForm()">Clear all form data</button>
</div>

<script src="data.js"></script>
<script src="state-and-ui.js"></script>
<script src="cad-parser.js"></script>
<script src="narrative-and-tabs.js"></script>
<script src="pdf-and-app.js"></script>
</body>
</html>
