<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aurelius Fire & Rescue — Run Report</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5ede0; min-height: 100vh; }
    button { cursor: pointer; font-family: Georgia, serif; }
    input, select, textarea { font-family: Georgia, serif; }

    /* ── Header ── */
    #app-header {
      background: linear-gradient(135deg, #8b0000 0%, #5a0000 100%);
      color: #fff;
      padding: 13px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    #header-eyebrow { font-size: 10px; letter-spacing: 0.15em; opacity: 0.7; text-transform: uppercase; }
    #header-title   { font-size: 18px; font-weight: 700; }
    #header-sub     { font-size: 11px; opacity: 0.65; margin-bottom: 7px; }
    #tab-bar {
      display: flex;
      overflow-x: auto;
      margin: 0 -16px;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none;
      border: none;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #ffcc00; }

    /* ── Content ── */
    #content { padding: 14px; max-width: 640px; margin: 0 auto; }
    #tab-content { margin-top: 14px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      border: 1.5px solid #e0c9a6;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .card-title {
      background: #8b0000;
      color: #fff;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .card-body { padding: 13px 13px 10px; }

    /* ── Form fields ── */
    .lbl {
      font-size: 11px;
      font-weight: 700;
      color: #8b0000;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .inp, .sel, .ta {
      width: 100%;
      box-sizing: border-box;
      background: #fff8f0;
      border: 1.5px solid #c8a97a;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 15px;
      color: #1a1a1a;
      outline: none;
      font-family: Georgia, serif;
      display: block;
    }
    .ta { resize: vertical; }
    .field-row { margin-bottom: 10px; }
    .flex-row { display: flex; gap: 10px; }
    .flex-1 { flex: 1; }
    .flex-2 { flex: 2; }

    /* ── Toggle ── */
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5ede0;
      border: 1.5px solid #c8a97a;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 7px;
      transition: all 0.15s;
    }
    .toggle.on { background: #8b0000; border-color: #8b0000; }
    .toggle-box {
      width: 18px; height: 18px;
      border-radius: 4px;
      background: #c8a97a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 900;
      color: transparent;
    }
    .toggle.on .toggle-box { background: #fff; color: #8b0000; }
    .toggle-label { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .toggle-sub   { font-size: 11px; color: #888; }
    .toggle.on .toggle-label { color: #fff; }
    .toggle.on .toggle-sub   { color: #ffcccc; }

    /* ── Nav buttons ── */
    #nav-row { display: flex; gap: 10px; margin-top: 8px; margin-bottom: 20px; }
    .btn-back  { flex:1; background:#fff; color:#8b0000; border:2px solid #8b0000; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; }
    .btn-save  { flex:1; background:#555; color:#fff; border:none; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; transition:background 0.2s; }
    .btn-save.saved { background: #2d6a2d; }
    .btn-next  { flex:1; background:#8b0000; color:#fff; border:none; border-radius:10px; padding:12px 0; font-size:15px; font-weight:700; }
    .btn-print { width:100%; background:#8b0000; color:#fff; border:none; border-radius:10px; padding:15px 0; font-size:17px; font-weight:700; letter-spacing:0.05em; margin-bottom:10px; }
    .btn-clear { width:100%; background:none; color:#aaa; border:1px solid #ddd; border-radius:8px; padding:8px 0; font-size:12px; margin-bottom:30px; }

    /* ── Preview summary ── */
    #preview-summary {
      border: 1px solid #ccc; border-radius: 6px;
      padding: 10px; background: #fafafa;
      font-size: 12px; line-height: 1.7;
    }
    #preview-summary .ps-title {
      font-weight: 700; font-size: 13px;
      border-bottom: 1px solid #ccc;
      margin-bottom: 6px; padding-bottom: 3px;
    }

    /* ════════════════════════════════
       PRINT FORM — hidden on screen
       ════════════════════════════════ */
    #print-form { display: none; }

    .rpt {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9pt;
      color: #000;
      width: 100%;
      padding: 0.35in;
    }
    .rpt-title {
      font-size: 15pt; font-weight: bold;
      text-align: center; letter-spacing: 0.06em;
      border-bottom: 2px solid #000;
      padding-bottom: 4px; margin-bottom: 8px;
    }
    .rpt table { border-collapse: collapse; width: 100%; margin-bottom: 4px; }
    .rpt td { border: 1px solid #000; padding: 2px 4px; vertical-align: top; font-size: 8.5pt; }
    .rpt .bl { font-weight: bold; font-size: 7.5pt; white-space: nowrap; }
    .rpt .ul { border-bottom: 1px solid #000; display: inline-block; min-height: 13px; padding-bottom: 1px; }
    .rpt .sec-hdr {
      font-weight: bold; font-size: 7.5pt;
      background: #ddd; border: 1px solid #000;
      padding: 2px 5px; border-bottom: none;
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .rpt .chkbox {
      display: inline-block;
      width: 9px; height: 9px;
      border: 1px solid #000;
      text-align: center; line-height: 9px;
      font-size: 8pt; margin-right: 3px; flex-shrink: 0;
      vertical-align: middle;
    }
    .rpt .chkbox.on { background: #000; color: #fff; font-weight: bold; }
    .rpt .disp-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .disp-item {
      flex: 0 0 50%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 8pt;
    }
    .rpt .disp-item.full { flex: 0 0 100%; border-right: none; }
    .rpt .disp-item:nth-child(even) { border-right: none; }
    .rpt .loc-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .loc-item {
      flex: 0 0 25%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 7.5pt;
    }
    .rpt .loc-item:nth-child(4n) { border-right: none; }
    .rpt .pers-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .pers-item {
      flex: 0 0 50%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      display: flex; align-items: center; gap: 3px; font-size: 8pt;
    }
    .rpt .pers-item:nth-child(even) { border-right: none; }
    .rpt .app-wrap { display: flex; flex-wrap: wrap; border: 1px solid #000; margin-bottom: 4px; }
    .rpt .app-item {
      flex: 0 0 20%; padding: 2px 5px;
      border-bottom: 1px solid #000; border-right: 1px solid #000;
      font-size: 7.5pt;
    }
    .rpt .app-item:nth-child(5n) { border-right: none; }
    .rpt .remarks-box {
      border: 1px solid #000; min-height: 55pt;
      padding: 4px; font-size: 8.5pt;
      white-space: pre-wrap; margin-bottom: 4px;
    }
    .rpt .footer-row {
      display: flex; justify-content: space-between;
      border-top: 1px solid #000; padding-top: 3px; font-size: 8pt;
      margin-top: 4px;
    }
    .page2 { padding: 0.35in; }
    .page2-title { font-size: 14pt; font-weight: bold; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 4px; }
  </style>
</head>

<script>

async function loadPersonnel() {
  // Always start with the built-in roster so the app is never stuck
  if (PERSONNEL.length === 0) PERSONNEL = [...PERSONNEL_FALLBACK];
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 4000); // 4-second timeout
    const res = await fetch('personnel.json?v=' + Date.now(), { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      PERSONNEL = data.map(p => ({
        name: String(p.name||'').trim(),
        badge: String(p.badge||'').trim(),
        qual: String(p.qual||'').trim().toLowerCase(),
      })).filter(p => p.name && p.badge);
      PERSONNEL.sort((a,b) => a.name.localeCompare(b.name));
      console.log(`Loaded ${PERSONNEL.length} personnel from personnel.json`);
    }
  } catch(e) {
    console.warn('Using built-in roster:', e.message);
    PERSONNEL = [...PERSONNEL_FALLBACK];
  }
};

const APPARATUS = ["Rescue 2","Engine 1","Engine 2","Rescue 1","Chief's Vehicle","Quint 1","Squad 1","Squad 2","Squad 3","Tanker 1"];
const TABS = ["Incident","Times","Dispatch","Apparatus","Personnel","MVA","EMS","Law","Remarks","Preview"];

const EMPTY = {
  date:"", runNum:"15-", ic:"", enteredBy:"", badge:"", entryDate:"",
  disp:"", enroute:"", arrived:"", clear:"", inQ:"",
  dispType:"", dispDetail:"", dispActual:"", locCode:"", address:"",
  apparatus:{}, apparatusDriver:{}, personnel:{},
  emtCt:"", intCt:"", totalCt:"",
  injName:"", injNum:"", rptFiled:"",
  amb:[{svc:"",custom:"",pcr:""},{svc:"",custom:"",pcr:""},{svc:"",custom:"",pcr:""}],
  refusedPcr:["","",""],
  law:["","",""],
  cars:[{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""}],
  mutual:[], mutualDir:"", remarks:"", reportBy:"", pg:"1", pgOf:"1", signature:"",
};

// ══════════════════════════════
// STATE
// ══════════════════════════════
let tab = 0;
let F = {...EMPTY}; // placeholder — properly loaded after personnel fetch

function loadForm() {
  let data = {...EMPTY};
  try {
    const s = localStorage.getItem("afr_v4");
    if (s) {
      const parsed = JSON.parse(s);
      data = Object.assign({}, EMPTY, parsed);
    }
  } catch(e) {}

  // ── Migrations for old data formats ──────────────────────
  // mutual: was string, now array
  if (!Array.isArray(data.mutual)) {
    data.mutual = data.mutual ? [data.mutual] : [];
  }
  // cars: expand to 6 if fewer
  if (!Array.isArray(data.cars)) data.cars = [];
  while (data.cars.length < 6) data.cars.push({model:"",plate:"",color:""});

  // amb: old format had {svc,custom,als} → now {svc,custom,pcr}
  if (!Array.isArray(data.amb)) data.amb = [];
  while (data.amb.length < 3) data.amb.push({svc:"",custom:"",pcr:""});
  data.amb = data.amb.map(a => ({
    svc: a.svc||"", custom: a.custom||"",
    pcr: a.pcr || a.als || ""  // migrate als→pcr if needed
  }));

  // refusedPcr: ensure array
  if (!Array.isArray(data.refusedPcr)) data.refusedPcr = ["","",""];
  while (data.refusedPcr.length < 3) data.refusedPcr.push("");

  // law: ensure array of 3
  if (!Array.isArray(data.law)) data.law = ["","",""];
  while (data.law.length < 3) data.law.push("");

  // apparatus / personnel: ensure objects
  if (typeof data.apparatus !== 'object' || Array.isArray(data.apparatus)) data.apparatus = {};
  if (typeof data.personnel !== 'object' || Array.isArray(data.personnel)) data.personnel = {};
  if (typeof data.apparatusDriver !== 'object' || Array.isArray(data.apparatusDriver)) data.apparatusDriver = {};

  return data;
}

function saveForm() {
  try { localStorage.setItem("afr_v4", JSON.stringify(F)); } catch(e) {}
}

function clearForm() {
  if (!confirm("Clear all form data and start fresh?")) return;
  F = Object.assign({}, EMPTY,{
    amb:[{svc:"",custom:"",pcr:""},{svc:"",custom:"",pcr:""},{svc:"",custom:"",pcr:""}],
    refusedPcr:["","",""],
    law:["","",""],
    cars:[{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""},{model:"",plate:"",color:""}],
    apparatus:{}, personnel:{},
  });
  try { localStorage.removeItem("afr_v4"); } catch(e) {}
  render();
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === 'onclick') el.addEventListener('click', v);
    else if (k === 'onchange') el.addEventListener('change', v);
    else if (k === 'oninput') el.addEventListener('input', v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'class') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function lbl(text) {
  const d = document.createElement('div');
  d.className = 'lbl';
  d.textContent = text;
  return d;
}

function inp(value, onInput, opts={}) {
  const el = document.createElement('input');
  el.type = opts.type || 'text';
  el.value = value || '';
  el.placeholder = opts.placeholder || '';
  el.className = 'inp';
  if (opts.style) Object.assign(el.style, opts.style);
  el.addEventListener('input', e => { onInput(e.target.value); });
  return el;
}

// Like inp but does NOT call onChange on every keystroke — only on blur/change.
// Use this inside functions that re-render their parent container on save,
// so the input field isn't destroyed mid-typing.
function stableInp(value, onChange, opts={}) {
  const el = document.createElement('input');
  el.type = opts.type || 'text';
  el.value = value || '';
  el.placeholder = opts.placeholder || '';
  el.className = 'inp';
  if (opts.style) Object.assign(el.style, opts.style);
  // Save on blur (when user leaves the field)
  el.addEventListener('blur', e => { onChange(e.target.value); });
  // Also save on Enter key
  el.addEventListener('keydown', e => { if (e.key === 'Enter') el.blur(); });
  return el;
}

function sel(value, options, onChange, style={}) {
  const el = document.createElement('select');
  el.className = 'sel';
  Object.assign(el.style, style);
  for (const [v, t] of options) {
    const o = document.createElement('option');
    o.value = v; o.textContent = t;
    if (v === value) o.selected = true;
    el.appendChild(o);
  }
  el.addEventListener('change', e => onChange(e.target.value));
  return el;
}

function card(title, ...children) {
  const c = document.createElement('div');
  c.className = 'card';
  if (title) {
    const t = document.createElement('div');
    t.className = 'card-title';
    t.textContent = title;
    c.appendChild(t);
  }
  const b = document.createElement('div');
  b.className = 'card-body';
  for (const child of children.flat()) {
    if (child) b.appendChild(child);
  }
  c.appendChild(b);
  return c;
}

function field(labelText, inputEl, mb=10) {
  const w = document.createElement('div');
  w.className = 'field-row';
  w.style.marginBottom = mb+'px';

// ── Time helpers ────────────────────────────────────────
function timeDiff(t1, t2) {
  // returns "X min" difference between two HH:MM strings, or '' if invalid
  if (!t1 || !t2) return '';
  const [h1,m1] = t1.split(':').map(Number);
  const [h2,m2] = t2.split(':').map(Number);
  if (isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)) return '';
  let diff = (h2*60+m2) - (h1*60+m1);
  if (diff < 0) diff += 1440; // crosses midnight
  if (diff === 0) return '';
  return `${diff} min`;
}

function makeTimeField(labelText, storeKey, prevKey) {
  const row = document.createElement('div');
  Object.assign(row.style, { display:'flex', alignItems:'center', gap:'10px', marginBottom:'12px' });

  // Label column
  const labelCol = document.createElement('div');
  Object.assign(labelCol.style, { width:'110px', flexShrink:'0' });
  const l = document.createElement('div');
  l.className = 'lbl';
  l.textContent = labelText;
  labelCol.appendChild(l);

  // Input
  const el = document.createElement('input');
  el.type = 'text';
  el.inputMode = 'numeric';
  el.className = 'inp';
  el.value = F[storeKey] || '';
  el.placeholder = 'HH:MM';
  Object.assign(el.style, { flex:'1', fontSize:'18px', fontWeight:'600', letterSpacing:'0.05em', textAlign:'center' });
  el.addEventListener('input', e => {
    let v = e.target.value.replace(/[^0-9]/g,'');
    if (v.length > 4) v = v.slice(0,4);
    // auto-insert colon
    if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2);
    el.value = v;
    F[storeKey] = v;
    saveForm();
    updateDiff();
  });

  // Diff badge
  const diffBadge = document.createElement('div');
  Object.assign(diffBadge.style, {
    minWidth:'54px', textAlign:'center', fontSize:'12px', fontWeight:'700',
    background:'#fff3cd', border:'1px solid #c8a97a', borderRadius:'6px',
    padding:'4px 6px', color:'#5a3e00', flexShrink:'0'
  });

  function updateDiff() {
    if (prevKey) {
      const d = timeDiff(F[prevKey], F[storeKey]);
      diffBadge.textContent = d ? '+'+d : '—';
      diffBadge.style.background = d ? '#d4edda' : '#f5f5f5';
      diffBadge.style.color = d ? '#155724' : '#999';
    }
  }
  updateDiff();

  row.appendChild(labelCol);
  row.appendChild(el);
  if (prevKey) row.appendChild(diffBadge);
  return row;
}

  body.appendChild(makeTimeField('Arrived',     'arrived', 'enroute'));

  body.appendChild(makeTimeField('In Quarters', 'inQ',     'clear'));

  const c = document.createElement('div');
  c.className = 'card';
  const t = document.createElement('div');
  t.className = 'card-title';
  t.textContent = 'Times';
  c.appendChild(t);
  c.appendChild(body);
  wrap.appendChild(c);

  // ── Response Time Summary card ───────────────────────────
  function parseMin(t) {
    if (!t) return null;
    const p = t.split(':');
    const h = parseInt(p[0]||0), m = parseInt(p[1]||0);
    return isNaN(h)||isNaN(m) ? null : h*60+m;
  }
  function fmtDur(mins) {
    if (mins === null || mins < 0) return '—';
    const h = Math.floor(mins/60), m = mins%60;
    return h > 0 ? `${h}h ${m}m` : `${m} min`;
  }

  const segments = [
    ['Total Call Time (Dispatch → In Quarters)', F.disp, F.inQ],
  ];

  const sumCard = document.createElement('div');
  sumCard.className = 'card';
  const sumTitle = document.createElement('div');
  sumTitle.className = 'card-title';
  sumTitle.textContent = 'Response Time Summary';
  const sumBody = document.createElement('div');
  sumBody.className = 'card-body';
  sumBody.style.cssText = 'display:flex;flex-wrap:wrap;gap:10px';

  for (const [label, t1, t2] of segments) {
    const p1 = parseMin(t1), p2 = parseMin(t2);
    let diff = null;
    if (p1 !== null && p2 !== null) { diff = p2 - p1; if (diff < 0) diff += 1440; }

    const box = document.createElement('div');
    box.style.cssText = 'flex:1;min-width:130px;background:#f5ede0;border:1px solid #e0c9a6;border-radius:6px;padding:8px 10px';
    const dl = document.createElement('div');
    dl.style.cssText = 'font-size:10px;font-weight:700;color:#8b0000;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px';
    dl.textContent = label;
    const dv = document.createElement('div');
    dv.style.cssText = 'font-size:18px;font-weight:700;color:#1a1a1a';
    dv.textContent = diff !== null ? fmtDur(diff) : '—';
    box.appendChild(dl);
    box.appendChild(dv);
    sumBody.appendChild(box);
  }

  sumCard.appendChild(sumTitle);
  sumCard.appendChild(sumBody);
  wrap.appendChild(sumCard);

  return wrap;
}

function tabPersonnel() {
  const selCount = PERSONNEL.filter(p=>F.personnel[p.badge]).length;

  // Calculate total personnel hours = selCount × totalCallMinutes
  function parseMin(t) {
    if (!t) return null;
    const p = t.split(':');
    const h = parseInt(p[0]||0), m = parseInt(p[1]||0);
    return isNaN(h)||isNaN(m) ? null : h*60+m;
  }
  const tDisp = parseMin(F.disp), tInQ = parseMin(F.inQ);
  let callMins = null;
  if (tDisp !== null && tInQ !== null) {
    callMins = tInQ - tDisp;
    if (callMins < 0) callMins += 1440;
  }
  const totalPersonnel = parseInt(F.totalCt) || selCount;
  const persHours = (callMins !== null && totalPersonnel > 0)
    ? ((callMins * totalPersonnel) / 60).toFixed(1)
    : null;

  const wrap = document.createElement('div');
  const togglesWrap = document.createElement('div');
  for (const p of PERSONNEL) {
    togglesWrap.appendChild(toggle(p.name, `Badge ${p.badge}${p.qual?' · '+p.qual.toUpperCase():''}`, !!F.personnel[p.badge], on => {
      if (on) F.personnel[p.badge]=true; else delete F.personnel[p.badge];
      saveForm(); renderTab();
    }));
  }
  wrap.appendChild(card(`Personnel — ${selCount} selected`, togglesWrap));

  // Counts card with personnel hours
  const countCard = document.createElement('div');
  countCard.className = 'card';
  const countTitle = document.createElement('div');
  countTitle.className = 'card-title';
  countTitle.textContent = 'Counts';
  const countBody = document.createElement('div');
  countBody.className = 'card-body';

  countBody.appendChild(flexRow(
    flexCol(1, lbl('EMTs'), inp(F.emtCt, v=>{F.emtCt=v;saveForm();}, {type:'number', placeholder:String(PERSONNEL.filter(p=>F.personnel[p.badge]&&p.qual&&p.qual.includes('emt')).length)+' (auto)'})),
    flexCol(1, lbl('Interior FF'), inp(F.intCt, v=>{F.intCt=v;saveForm();}, {type:'number', placeholder:String(PERSONNEL.filter(p=>F.personnel[p.badge]&&p.qual&&p.qual.includes('int')).length)+' (auto)'})),
    flexCol(1, lbl('Total'), inp(F.totalCt, v=>{F.totalCt=v;saveForm();}, {type:'number', placeholder:String(selCount)+' (auto)'}))
  ));

  // Personnel hours display
  const phDiv = document.createElement('div');
  phDiv.style.cssText = 'margin-top:12px;background:#f5ede0;border:1px solid #e0c9a6;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:14px';
  const phLabel = document.createElement('div');
  phLabel.style.cssText = 'font-size:11px;font-weight:700;color:#8b0000;text-transform:uppercase;letter-spacing:.05em';
  phLabel.textContent = 'Total Personnel Hours';
  const phValue = document.createElement('div');
  phValue.style.cssText = 'font-size:22px;font-weight:700;color:#1a1a1a';
  phValue.textContent = persHours !== null ? persHours + ' hrs' : '—';
  const phNote = document.createElement('div');
  phNote.style.cssText = 'font-size:10px;color:#888;margin-top:1px';
  phNote.textContent = callMins !== null
    ? `${totalPersonnel} personnel × ${callMins} min call`
    : 'Set times on Dispatch tab to calculate';
  const phLeft = document.createElement('div');
  phLeft.appendChild(phLabel);
  phLeft.appendChild(phNote);
  phDiv.appendChild(phLeft);
  phDiv.appendChild(phValue);
  countBody.appendChild(phDiv);

  countCard.appendChild(countTitle);
  countCard.appendChild(countBody);
  wrap.appendChild(countCard);
  return wrap;
}

function vehicleSelector(currentVal, onChange) {
  const wrap = document.createElement('div');

  // Determine if current value is a custom entry
  const isCustom = currentVal && !COMMON_VEHICLES.includes(currentVal);
  const selectVal = isCustom ? 'Other (type below)' : (currentVal || '');

  const dd = document.createElement('select');
  dd.className = 'sel';
  dd.style.marginBottom = '8px';

  // Build option list grouped by category
  const groups = [
    { label: '— Select Vehicle —', items: [''] },
    { label: 'Pickup Trucks',      items: COMMON_VEHICLES.slice(0, 14) },
    { label: 'SUVs',               items: COMMON_VEHICLES.slice(14, 46) },
    { label: 'Cars & Sedans',      items: COMMON_VEHICLES.slice(46, 76) },
    { label: 'Vans & Minivans',    items: COMMON_VEHICLES.slice(76, 87) },
    { label: 'Commercial & Other', items: COMMON_VEHICLES.slice(87) },
  ];

  for (const g of groups) {
    if (g.label === '— Select Vehicle —') {
      const o = document.createElement('option');
      o.value = ''; o.textContent = '— Select Vehicle —';
      dd.appendChild(o);
    } else {
      const og = document.createElement('optgroup');
      og.label = g.label;
      for (const v of g.items) {
        const o = document.createElement('option');
        o.value = v; o.textContent = v;
        if (v === selectVal) o.selected = true;
        og.appendChild(o);
      }
      dd.appendChild(og);
    }
  }

  // Custom text input (shown when "Other" selected or custom value)
  const customInp = document.createElement('input');
  customInp.type = 'text';
  customInp.className = 'inp';
  customInp.placeholder = 'Year, Make, Model (e.g. 2019 Ford F-150)';
  customInp.style.display = (selectVal === 'Other (type below)' || isCustom) ? 'block' : 'none';
  customInp.value = isCustom ? currentVal : '';

  dd.addEventListener('change', () => {
    const v = dd.value;
    if (v === 'Other (type below)') {
      customInp.style.display = 'block';
      customInp.focus();
      onChange('');
    } else {
      customInp.style.display = 'none';
      onChange(v);
    }
  });

  customInp.addEventListener('input', () => { onChange(customInp.value); });

  wrap.appendChild(dd);
  wrap.appendChild(customInp);
  return wrap;
}

function lawRow(idx, renderFn) {
  // Build one law enforcement row: agency dropdown + optional unit/officer text
  const current = F.law[idx] || '';
  // stored as "Agency||UnitDetail"
  const parts = current.split('||');
  const agency = parts[0] || '';
  const detail = parts[1] || '';
  const isOther = agency === 'Other';
  const isCustomAgency = agency && !LAW_AGENCIES.includes(agency);

  const wrap = document.createElement('div');
  wrap.style.marginBottom = '10px';

  const rowLbl = document.createElement('div');
  rowLbl.className = 'lbl';
  rowLbl.textContent = `Officer / Unit ${idx + 1}`;
  rowLbl.style.marginBottom = '4px';
  wrap.appendChild(rowLbl);

  const agencySel = document.createElement('select');
  agencySel.className = 'sel';
  agencySel.style.marginBottom = '6px';

  const blankOpt = document.createElement('option');
  blankOpt.value = ''; blankOpt.textContent = '— Select Agency —';
  agencySel.appendChild(blankOpt);

  for (const a of LAW_AGENCIES) {
    const o = document.createElement('option');
    o.value = a; o.textContent = a;
    if (a === agency) o.selected = true;
    agencySel.appendChild(o);
  }

  // Custom agency text box
  const customAgency = document.createElement('input');
  customAgency.type = 'text';
  customAgency.className = 'inp';
  customAgency.placeholder = 'Enter agency name…';
  customAgency.style.marginBottom = '6px';
  customAgency.style.display = isOther ? 'block' : 'none';
  customAgency.value = isOther ? (isCustomAgency ? agency : '') : '';

  // Officer / unit detail text box (shown once agency is chosen)
  const detailInp = document.createElement('input');
  detailInp.type = 'text';
  detailInp.className = 'inp';
  detailInp.placeholder = 'Officer name / badge / unit #';
  detailInp.style.display = agency ? 'block' : 'none';
  detailInp.value = detail;

  function save() {
    const ag = agencySel.value === 'Other'
      ? (customAgency.value.trim() || 'Other')
      : agencySel.value;
    F.law[idx] = ag ? ag + '||' + detailInp.value : '';
    saveForm();
    // Only trigger re-render from the dropdown change, not from text fields
  }

  function saveAndRender() {
    save();
    if (renderFn) renderFn();
  }

  agencySel.addEventListener('change', () => {
    customAgency.style.display = agencySel.value === 'Other' ? 'block' : 'none';
    detailInp.style.display = agencySel.value ? 'block' : 'none';
    if (agencySel.value !== 'Other') customAgency.value = '';
    saveAndRender();
  });
  // Use blur not input — so keyboard stays open while typing
  customAgency.addEventListener('blur',  save);
  customAgency.addEventListener('keydown', e => { if(e.key==='Enter') customAgency.blur(); });
  detailInp.addEventListener('blur',  saveAndRender);
  detailInp.addEventListener('keydown', e => { if(e.key==='Enter') detailInp.blur(); });

  wrap.appendChild(agencySel);
  wrap.appendChild(customAgency);
  wrap.appendChild(detailInp);
  return wrap;
}

function tabMVA() {
  const wrap = document.createElement('div');

  // Ensure cars array has 6 slots
  while (F.cars.length < 6) F.cars.push({model:"",plate:"",color:""});

  // Card container
  const mvaCard = document.createElement('div');
  mvaCard.className = 'card';
  const mvaTitle = document.createElement('div');
  mvaTitle.className = 'card-title';
  mvaTitle.textContent = 'Vehicles Involved';
  const mvaBody = document.createElement('div');
  mvaBody.className = 'card-body';
  mvaCard.appendChild(mvaTitle);
  mvaCard.appendChild(mvaBody);

  function vehicleComplete(i) {
    // A vehicle slot is "started" if any field has a value
    const c = F.cars[i];
    return !!(c.model || c.plate || c.color);
  }

  function renderVehicles() {
    mvaBody.innerHTML = '';

    for (let i = 0; i < 6; i++) {
      // Show slot if: it's the first, OR the previous slot has been started
      const show = i === 0 || vehicleComplete(i - 1);
      if (!show) break;

      // Divider between entries
      if (i > 0) {
        const div = document.createElement('div');
        div.style.cssText = 'border-top:1px solid #f0e8d8;margin:14px 0 14px';
        mvaBody.appendChild(div);
      }

      const rowTitle = document.createElement('div');
      rowTitle.style.cssText = 'font-size:11px;font-weight:700;color:#8b0000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px';
      rowTitle.textContent = `Vehicle ${i + 1}`;
      mvaBody.appendChild(rowTitle);

      // Vehicle selector
      const modelLbl = document.createElement('div');
      modelLbl.className = 'lbl';
      modelLbl.textContent = 'Year / Make / Model';
      modelLbl.style.marginBottom = '4px';
      mvaBody.appendChild(modelLbl);

      const vs = vehicleSelector(F.cars[i].model, v => {
        F.cars[i].model = v;
        saveForm();
        renderVehicles();
      });
      mvaBody.appendChild(vs);

      mvaBody.appendChild((() => { const d = document.createElement('div'); d.style.height = '8px'; return d; })());

      // Plate and Color
      const plateCol = flexCol(1,
        lbl('Plate #'),
        stableInp(F.cars[i].plate, v => { F.cars[i].plate = v; saveForm(); renderVehicles(); }, {placeholder:'Plate #'})
      );

      const colorCol = document.createElement('div');
      colorCol.style.flex = '1';
      const colorLbl = document.createElement('div');
      colorLbl.className = 'lbl';
      colorLbl.style.marginBottom = '4px';
      colorLbl.textContent = 'Color';
      colorCol.appendChild(colorLbl);
      colorCol.appendChild(colorSelector(F.cars[i].color, v => {
        F.cars[i].color = v;
        saveForm();
        renderVehicles();
      }));

      mvaBody.appendChild(flexRow(plateCol, colorCol));
    }

    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:11px;color:#aaa;margin-top:10px';
    const shown = F.cars.filter((_,i) => i===0 || vehicleComplete(i-1)).length;
    if (shown < 6) hint.textContent = `Vehicle ${shown + 1} will appear after Vehicle ${shown} is filled in.`;
    mvaBody.appendChild(hint);
  }

  renderVehicles();
  wrap.appendChild(mvaCard);
  return wrap;
}

  sigBody.appendChild(sigLbl);

  // Roster dropdown to select who is signing
  const sigPersOpts = [["","— Select from Roster —"], ...PERSONNEL.map(p=>[p.badge, p.name + ' (Badge ' + p.badge + ')'])];
  const sigPersSel = sel(F.reportBy||'', sigPersOpts, v => {

  });
  sigPersSel.style.marginBottom = '10px';
  sigBody.appendChild(sigPersSel);

  sigNameDisplay.style.cssText = 'font-size:13px;font-weight:600;color:#8b0000;margin-bottom:6px;min-height:18px';
  const sigFound = PERSONNEL.find(p=>p.badge===F.reportBy);
  sigNameDisplay.textContent = sigFound ? sigFound.name + ' — Badge ' + sigFound.badge : '';
  sigBody.appendChild(sigNameDisplay);

  const sigDrawLbl = document.createElement('div');
  sigDrawLbl.className = 'lbl';
  sigDrawLbl.style.marginBottom = '6px';
  sigDrawLbl.textContent = 'Sign below with your finger or stylus';
  sigBody.appendChild(sigDrawLbl);

  const canvas = document.createElement('canvas');
  canvas.width = 580;
  canvas.height = 140;
  Object.assign(canvas.style, {
    width:'100%', height:'140px', border:'1.5px solid #c8a97a',
    borderRadius:'8px', background:'#fff8f0', display:'block',
    touchAction:'none', cursor:'crosshair'
  });

  // Restore saved signature if any
  const ctx = canvas.getContext('2d');
  if (!ctx) {
    // Canvas not supported in this environment — show text fallback
    const fallback = document.createElement('div');
    fallback.style.cssText = 'padding:12px;background:#f5ede0;border:1.5px solid #c8a97a;border-radius:8px;font-size:13px;color:#888';
    fallback.textContent = 'Signature pad not available in this environment. Sign on the printed form.';
    sigBody.appendChild(fallback);
    sigCard.appendChild(sigTitle);
    sigCard.appendChild(sigBody);
    wrap.appendChild(sigCard);
    return wrap;
  }

  if (F.signature) {
    const img = new Image();
    img.onload = () => { const c = canvas.getContext('2d'); if(c) c.drawImage(img,0,0); };
    img.src = F.signature;
  }

  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width / r.width;
    const scaleY = canvas.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return [(src.clientX - r.left) * scaleX, (src.clientY - r.top) * scaleY];
  }

  canvas.addEventListener('mousedown',  e => { drawing=true; [lastX,lastY]=getPos(e); });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; [lastX,lastY]=getPos(e); }, {passive:false});

  function draw(e) {
    if (!drawing) return;
    e.preventDefault && e.preventDefault();
    const [x,y] = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX,lastY);
    ctx.lineTo(x,y);
    ctx.stroke();
    [lastX,lastY] = [x,y];
  }
  canvas.addEventListener('mousemove',  draw);
  canvas.addEventListener('touchmove',  draw, {passive:false});

  function stopDraw() {
    if (!drawing) return;
    drawing = false;
    F.signature = canvas.toDataURL();
    saveForm();
  }
  canvas.addEventListener('mouseup',   stopDraw);
  canvas.addEventListener('mouseleave',stopDraw);
  canvas.addEventListener('touchend',  stopDraw);

  sigBody.appendChild(canvas);

  // Clear button
  const clearSig = document.createElement('button');
  clearSig.textContent = '✕ Clear Signature';
  clearSig.style.cssText = 'margin-top:8px;background:none;border:1.5px solid #c8a97a;border-radius:6px;padding:6px 14px;font-size:13px;color:#8b0000;cursor:pointer;font-family:Georgia,serif';
  clearSig.addEventListener('click', () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    F.signature = '';
    saveForm();
  });
  sigBody.appendChild(clearSig);

  sigCard.appendChild(sigTitle);
  sigCard.appendChild(sigBody);
  wrap.appendChild(sigCard);

  return wrap;
}

function tabPreview() {
  const selCount = PERSONNEL.filter(p=>F.personnel[p.badge]).length;
  const dispEntry = [...DISPATCH_TYPES,...DISPATCH_SPECIAL].find(d=>d.code===F.dispType);
  const locEntry = LOCATIONS.find(l=>l.code===F.locCode);
  const icName = (PERSONNEL.find(p=>p.badge===F.ic)||{name:F.ic||'—'}).name;
  const autoEmt = PERSONNEL.filter(p=>F.personnel[p.badge]&&p.qual&&p.qual.includes('emt')).length;
  const autoInt = PERSONNEL.filter(p=>F.personnel[p.badge]&&p.qual&&p.qual.includes('int')).length;

  // Calculate call time
  function parseMin(t) {
    if (!t) return null;
    const p = t.split(':');
    const h = parseInt(p[0]||0), m = parseInt(p[1]||0);
    return isNaN(h)||isNaN(m) ? null : h*60+m;
  }
  const tDisp = parseMin(F.disp), tInQ = parseMin(F.inQ);
  let callMins = null;
  if (tDisp !== null && tInQ !== null) { callMins = tInQ - tDisp; if (callMins < 0) callMins += 1440; }
  const totalPers = parseInt(F.totalCt) || selCount;
  const persHours = callMins !== null && totalPers > 0 ? ((callMins * totalPers) / 60).toFixed(1) : null;

  const wrap = document.createElement('div');

  // Summary card built with DOM (no nested template literals)
  const summary = document.createElement('div');
  summary.id = 'preview-summary';
  const rows = [
    ['Run #', F.runNum||'—', 'Date', F.date||'—'],
    ['IC', icName],
    ['Dispatch → Arr → Clear', (F.disp||'—') + ' → ' + (F.arrived||'—') + ' → ' + (F.clear||'—')],
    ['Type', dispEntry ? dispEntry.label + (F.dispDetail ? ' – ' + F.dispDetail : '') : '—'],
    ['Location', locEntry ? locEntry.code + ' ' + locEntry.label : '—'],
    ['Address', F.address||'—'],
    ['Apparatus', APPARATUS.filter(a=>F.apparatus[a]).join(', ')||'None'],
    ['Personnel', selCount + ' selected · EMTs ' + (F.emtCt||autoEmt) + ' · Interior ' + (F.intCt||autoInt) + ' · Total ' + (F.totalCt||selCount)],
    ['Call Time', callMins !== null ? Math.floor(callMins/60) + 'h ' + (callMins%60) + 'm' : '—',
     'Personnel Hours', persHours !== null ? persHours + ' hrs' : '—'],
  ];

  const title = document.createElement('div');
  title.className = 'ps-title';
  title.textContent = 'AURELIUS FIRE AND RESCUE — Summary';
  summary.appendChild(title);

  for (const row of rows) {
    const d = document.createElement('div');
    d.style.marginBottom = '2px';
    for (let i = 0; i < row.length; i += 2) {
      const b = document.createElement('b');
      b.textContent = row[i] + ': ';
      d.appendChild(b);
      d.appendChild(document.createTextNode(row[i+1] || ''));
      if (i + 2 < row.length) d.appendChild(document.createTextNode(' \u00a0 '));
    }
    summary.appendChild(d);
  }

  const ambList = (F.amb||[]).filter(a=>a.svc).map(a=>a.svc==='Other'?a.custom||'Other':a.svc);
  if (ambList.length) {
    const d = document.createElement('div');
    const b = document.createElement('b');
    b.textContent = 'Ambulance: ';
    d.appendChild(b);
    d.appendChild(document.createTextNode(ambList.join(', ')));
    summary.appendChild(d);
  }
  if (F.remarks) {
    const d = document.createElement('div');
    const b = document.createElement('b');
    b.textContent = 'Remarks: ';
    d.appendChild(b);
    d.appendChild(document.createTextNode(F.remarks.slice(0,100) + (F.remarks.length>100?'…':'')));
    summary.appendChild(d);
  }

  wrap.appendChild(card('Ready to Print', summary));

  const btn = document.createElement('button');
  btn.className = 'btn-print';
  btn.textContent = '📄 Generate & Download PDF';
  btn.addEventListener('click', generatePDF);
  wrap.appendChild(btn);

  const btnShare = document.createElement('button');
  btnShare.className = 'btn-print';
  btnShare.textContent = '✉️ Generate PDF & Send via Email';
  btnShare.style.background = '#1a4a8a';
  btnShare.style.marginTop = '0';
  btnShare.addEventListener('click', generateAndShare);
  wrap.appendChild(btnShare);

  const btn2 = document.createElement('button');
  btn2.className = 'btn-print';
  btn2.textContent = '🖨 Download Blank Form (Print & Fill by Hand)';
  btn2.style.background = '#555';
  btn2.style.marginTop = '0';
  btn2.addEventListener('click', generateBlankPDF);
  wrap.appendChild(btn2);

  return wrap;
}

function chkHtml(on) {
  return `<span class="chkbox${on?' on':''}">${on?'X':''}</span>`;
}
function ambName(a) {
  return a.svc === 'Other' ? (a.custom||'Other') : a.svc;
}

function timeDiffStr(t1, t2) {
  if (!t1 || !t2) return '';
  const parse = t => { const p=t.split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); };
  let d = parse(t2) - parse(t1);
  if (d < 0) d += 1440;
  return d > 0 ? `+${d} min` : '';
}

function generatePDF() {
  if (typeof html2pdf === 'undefined') {
    alert('PDF library not loaded. Please check your internet connection.');
    return;
  }
  const container = document.getElementById('print-form');
  container.innerHTML = buildPrintHTML();
  container.style.display = 'block';
  const fn = `AureliusRunReport_${(F.runNum||'').replace(/[^a-z0-9]/gi,'_')}_${(F.date||'').replace(/-/g,'')}.pdf`;
  html2pdf().set({
    margin: 0,
    filename: fn,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
    pagebreak: { mode: ['css', 'legacy'] }
  }).from(container).save().then(() => { container.style.display = 'none'; });
}

async function generateAndShare() {
  if (typeof html2pdf === 'undefined') {
    alert('PDF library not loaded. Please check your internet connection.');
    return;
  }

  const fn = `AureliusRunReport_${(F.runNum||'').replace(/[^a-z0-9]/gi,'_')}_${(F.date||'').replace(/-/g,'')}.pdf`;

  // Show a status message while generating
  const statusEl = document.getElementById('share-status');
  if (statusEl) { statusEl.textContent = '⏳ Generating PDF…'; statusEl.style.display = 'block'; }

  const container = document.getElementById('print-form');
  container.innerHTML = buildPrintHTML();
  container.style.display = 'block';

  try {
    // Generate as blob instead of downloading directly
    const pdfBlob = await html2pdf().set({
      margin: 0,
      filename: fn,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
      pagebreak: { mode: ['css', 'legacy'] }
    }).from(container).outputPdf('blob');

    container.style.display = 'none';

    const pdfFile = new File([pdfBlob], fn, { type: 'application/pdf' });

    // Try Web Share API (iOS 15+ / Android Chrome) — supports file attachments
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
      if (statusEl) statusEl.style.display = 'none';
      await navigator.share({
        title: `Run Report ${F.runNum||''} — ${F.date||''}`,
        text: `Aurelius Fire & Rescue Run Report ${F.runNum||''} dated ${F.date||''}`,
        files: [pdfFile]
      });
    }
    // Fallback: try navigator.share without files (older devices), then open mail
    else if (navigator.share) {
      // Download the file first so user has it, then open share
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url; a.download = fn; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      if (statusEl) { statusEl.textContent = 'PDF downloaded. Opening email…'; }
      setTimeout(() => {
        window.location.href = `mailto:?subject=${encodeURIComponent('Run Report '+F.runNum+' — '+F.date)}&body=${encodeURIComponent('Aurelius Fire & Rescue Run Report attached.\n\nRun #: '+F.runNum+'\nDate: '+F.date+'\nIC: '+((PERSONNEL.find(p=>p.badge===F.ic)||{name:F.ic||''}).name))}`;
        if (statusEl) statusEl.style.display = 'none';
      }, 800);
    }
    // Last fallback: just download the PDF
    else {
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url; a.download = fn; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      if (statusEl) { statusEl.textContent = '✓ PDF downloaded — attach it manually in your email app.'; }
      setTimeout(() => { if (statusEl) statusEl.style.display = 'none'; }, 4000);
    }
  } catch(e) {
    container.style.display = 'none';
    if (e.name !== 'AbortError') { // AbortError = user cancelled share sheet, not an error
      console.error('Share error:', e);
      if (statusEl) { statusEl.textContent = 'Could not share. Try Download instead.'; }
      setTimeout(() => { if (statusEl) statusEl.style.display = 'none'; }, 3000);
    } else {
      if (statusEl) statusEl.style.display = 'none';
    }
  }
}

  // Apparatus rows (5 per row) with driver name
  let appRows = '';
  for (let r=0; r<2; r++) {
    const slice = APPARATUS.slice(r*5, r*5+5);
    appRows += '<tr>' + slice.map(a => {
      const active = !!F.apparatus[a];
      const driverBadge = (F.apparatusDriver||{})[a];
      const driverName = driverBadge ? (PERSONNEL.find(p=>p.badge===driverBadge)||{name:''}).name : '';
      return `<td style="width:20%;font-weight:${active?'bold':'normal'};background:${active?'#eee':'#fff'}">
        <div style="font-size:7.5pt;text-transform:uppercase">${a}</div>
        <div style="border-bottom:1px solid #000;min-height:12pt;font-size:7pt">${driverName}</div>
      </td>`;
    }).join('') + '</tr>';
  }

  // Dispatch checkboxes (2 cols)
  let dispHtml = '';
  for (let i=0; i<DISPATCH_TYPES.length; i+=2) {
    const d1 = DISPATCH_TYPES[i], d2 = DISPATCH_TYPES[i+1];
    dispHtml += `<div class="disp-item">${chkHtml(F.dispType===d1.code)} ${d1.label}</div>`;
    if (d2) dispHtml += `<div class="disp-item">${chkHtml(F.dispType===d2.code)} ${d2.label}</div>`;
  }
  for (const d of DISPATCH_SPECIAL) {
    const detail = (F.dispType===d.code && F.dispDetail) ? ` ${F.dispDetail}` : '___________';
    dispHtml += `<div class="disp-item full">${chkHtml(F.dispType===d.code)} ${d.label}${detail}</div>`;
  }

  // Location checkboxes (4 cols)
  let locHtml = LOCATIONS.map(l =>
    `<div class="loc-item">${chkHtml(F.locCode===l.code)} ${l.code} ${l.label}</div>`
  ).join('');

  // Personnel (2 cols)
  let persHtml = PERSONNEL.map(p =>
    `<div class="pers-item">${chkHtml(!!F.personnel[p.badge])}
      <span style="font-weight:${F.personnel[p.badge]?'bold':'normal'}">${p.name}</span>
      <span style="color:#555;font-size:7.5pt">&nbsp;${p.badge}${p.qual?' '+p.qual:''}</span>
    </div>`
  ).join('');

  // Vehicle rows — only show filled ones, up to 6
  const filledCars = (F.cars||[]).filter(c => c.model || c.plate || c.color);
  let mvaRows = filledCars.length ? filledCars.map((c,i) =>
    `<tr>
      <td style="width:10%;font-size:7.5pt"><b>VEH #${i+1}</b></td>
      <td style="font-size:7.5pt"><b>MODEL:</b> ${c.model||'&nbsp;'.repeat(28)}</td>
      <td style="font-size:7.5pt"><b>PLATE#:</b> ${c.plate||'&nbsp;'.repeat(12)}</td>
      <td style="font-size:7.5pt"><b>COLOR:</b> ${c.color||'&nbsp;'.repeat(10)}</td>
    </tr>`
  ).join('') : `<tr><td colspan="4" style="font-size:7.5pt;color:#aaa">No vehicles entered</td></tr>`;

  // Ambulances — each with their own PCR #
  const usedAmbs = F.amb.filter(a => a.svc);
  let ambCells = F.amb.map((a,i) =>
    `<td><b>${i+1}:</b> ${ambName(a)||'&nbsp;'.repeat(18)} &nbsp; <b>PCR#:</b> ${a.pcr||'___________'}</td>`
  ).join('');

  // Refused Transport PCR
  const usedRefused = (F.refusedPcr||[]).filter(p=>p.trim());
  const refusedLine = usedRefused.length
    ? usedRefused.map((p,i)=>`<b>Refused PCR #${i+1}:</b> ${p}`).join(' &nbsp;|&nbsp; ')
    : '';

  // Law — stored as "Agency||Detail", print as "Agency — Detail"
  let lawCells = F.law.map((l,i) => {
    if (!l) return `<td><b>${i+1}:</b> ${'&nbsp;'.repeat(30)}</td>`;
    const parts = l.split('||');
    const display = parts[0] + (parts[1] ? ' — ' + parts[1] : '');
    return `<td><b>${i+1}:</b> ${display}</td>`;
  }).join('');

// RENDER

function updateHeader() {
  document.getElementById('header-sub').textContent =
    `#${F.runNum||'—'} · ${F.date||'No date set'}`;
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  TABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===tab?' active':'');
    btn.textContent = t;
    btn.addEventListener('click', () => { tab=i; render(); });
    bar.appendChild(btn);
  });
}

function renderTab() {
  const tc = document.getElementById('tab-content');
  tc.innerHTML = '';
  const builders = [tabIncident,tabTimes,tabDispatch,tabApparatus,tabPersonnel,tabMVA,tabEMS,tabLaw,tabRemarks,tabPreview];
  try {
    tc.appendChild(builders[tab]());
  } catch(e) {
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'background:#fff0f0;border:2px solid #c00;border-radius:8px;padding:16px;margin:14px;font-family:monospace;font-size:13px;color:#c00;white-space:pre-wrap';
    errDiv.textContent = 'TAB ERROR [' + TABS[tab] + ']:\n' + e.message + '\n\n' + (e.stack||'').split('\n').slice(0,6).join('\n');
    tc.appendChild(errDiv);
    console.error('renderTab error on tab', TABS[tab], e);
  }
}

function renderNav() {
  const nav = document.getElementById('nav-row');
  nav.innerHTML = '';
  if (tab > 0) {
    const back = document.createElement('button');
    back.className = 'btn-back';
    back.textContent = '← Back';
    back.addEventListener('click', () => { tab--; render(); });
    nav.appendChild(back);
  }
  if (tab < TABS.length-1) {
    const next = document.createElement('button');
    next.className = 'btn-next';
    next.textContent = 'Next →';
    next.addEventListener('click', () => { tab++; render(); });
    nav.appendChild(next);
  }
}

function render() {
  updateHeader();
  renderTabBar();
  renderTab();
  renderNav();
}

// ── Reload personnel roster on demand ──────────────────
async function reloadPersonnel() {
  const btn = document.getElementById('reload-btn');
  const orig = btn.textContent;
  btn.textContent = '⏳ Loading…';
  btn.disabled = true;
  try {
    await loadPersonnel();
    btn.textContent = '✓ Updated!';
    btn.style.background = 'rgba(45,106,45,0.7)';
    // Re-render current tab in case Personnel tab is open
    renderTab();
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = 'rgba(255,255,255,0.15)';
      btn.disabled = false;
    }, 2000);
  } catch(e) {
    btn.textContent = '✗ Failed';
    btn.style.background = 'rgba(139,0,0,0.5)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = 'rgba(255,255,255,0.15)';
      btn.disabled = false;
    }, 2500);
  }
}

// Boot immediately with built-in roster — don't wait for fetch
PERSONNEL = [...PERSONNEL_FALLBACK];
F = loadForm();
render();

// Then try to load updated personnel.json in background
fetch('personnel.json?v=' + Date.now())
  .then(r => r.ok ? r.json() : Promise.reject('not ok'))
  .then(data => {
    if (Array.isArray(data) && data.length > 0) {
      PERSONNEL = data.map(p => ({
        name: String(p.name||'').trim(),
        badge: String(p.badge||'').trim(),
        qual: String(p.qual||'').trim().toLowerCase(),
      })).filter(p => p.name && p.badge);
      PERSONNEL.sort((a,b) => a.name.localeCompare(b.name));
      // Silently re-render current tab to pick up updated roster
      renderTab();
      document.getElementById('header-sub').textContent =
        '#' + (F.runNum||'—') + ' · ' + (F.date||'No date set');
    }
  })
  .catch(() => { /* stay with built-in fallback */ });
