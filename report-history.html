<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurelius F&R — Report History</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f5ede0;min-height:100vh;font-size:15px}
  button{cursor:pointer;font-family:Arial,sans-serif}

  header{background:linear-gradient(135deg,#8b0000,#5a0000);color:#fff;padding:16px 20px 14px}
  header h1{font-size:20px;font-weight:700}
  header p{font-size:12px;opacity:.75;margin-top:3px}

  .container{max-width:900px;margin:0 auto;padding:16px}

  #status{padding:12px 16px;font-size:13px;font-weight:600;border-radius:8px;margin-bottom:14px;display:none}
  #status.ok {background:#d4edda;color:#155724;border:1.5px solid #b8dfc5;display:block}
  #status.err{background:#f8d7da;color:#721c24;border:1.5px solid #f0b8bc;display:block}
  #status.info{background:#e7f0fb;color:#1a4a8a;border:1.5px solid #c6dcf5;display:block}

  .search-box{background:#fff;border-radius:10px;border:1.5px solid #e0c9a6;padding:16px;margin-bottom:16px}
  .search-box label{display:block;font-size:11px;font-weight:700;color:#8b0000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .search-box input{width:100%;border:1.5px solid #c8a97a;border-radius:8px;padding:12px 14px;font-size:16px;font-family:Arial,sans-serif;outline:none;background:#fff8f0}
  .search-box input:focus{border-color:#8b0000;background:#fff}
  .search-meta{font-size:12px;color:#888;margin-top:8px}

  .table-wrap{background:#fff;border-radius:10px;border:1.5px solid #e0c9a6;overflow:hidden}
  .table-hdr{background:#8b0000;color:#fff;padding:10px 16px;font-size:13px;font-weight:700}

  .result{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0e8d8}
  .result:last-child{border-bottom:none}
  .result:hover{background:#fffaf2}
  .r-main{flex:1;min-width:0}
  .r-title{font-size:15px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .r-sub{font-size:12px;color:#777;margin-top:3px;line-height:1.5}
  .r-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;background:#f0e8d8;color:#8b0000;white-space:nowrap}
  .open-btn{background:#8b0000;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;flex-shrink:0}

  .empty{padding:30px 16px;text-align:center;color:#999;font-size:14px}

  .conn{background:#fff;border-radius:10px;border:1.5px solid #e0c9a6;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.6}
  .conn h3{font-size:14px;font-weight:700;color:#8b0000;margin-bottom:8px}
  .conn input{width:100%;border:1.5px solid #c8a97a;border-radius:8px;padding:10px 12px;font-size:15px;margin-top:6px;margin-bottom:10px;font-family:Arial,sans-serif}
  .btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:600}
  .btn-green{background:#2d6a2d;color:#fff}
  .btn-sm{padding:6px 14px;font-size:13px}

  /* ── Detail modal ── */
  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
  #modal-overlay.open{display:flex}
  #modal{background:#fff;border-radius:14px;width:100%;max-width:560px;margin-top:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3)}
  #modal-title{background:#8b0000;color:#fff;padding:14px 18px;font-size:16px;font-weight:700}
  #modal-body{padding:18px;font-size:13.5px;line-height:1.7}
  #modal-body .row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f5f0e6}
  #modal-body .row .k{width:130px;flex-shrink:0;font-weight:700;color:#8b0000;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  #modal-body .row .v{flex:1}
  #modal-body .narr{margin-top:10px;padding:10px;background:#fdf9f2;border-radius:8px;font-size:13px;line-height:1.6}
  #modal-footer{padding:14px 18px;border-top:1px solid #f0e8d8;display:flex;justify-content:flex-end}
</style>
</head>
<body>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title">Report</div>
    <div id="modal-body"></div>
    <div id="modal-footer">
      <button class="btn btn-green btn-sm" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<header>
  <h1>Aurelius Fire &amp; Rescue</h1>
  <p>Report History — search all saved incident reports</p>
</header>

<div class="container">
  <div id="status"></div>

  <div class="conn" id="conn-box" style="display:none">
    <h3>Connection</h3>
    <label style="font-size:12px;font-weight:700;color:#8b0000">Reports Worker URL</label>
    <input id="worker-url" type="text" placeholder="https://aurelius-reports-api.YOUR-SUBDOMAIN.workers.dev/reports"/>
    <button class="btn btn-green btn-sm" onclick="connect()">Connect &amp; Load</button>
  </div>

  <div class="search-box" id="search-box" style="display:none">
    <label>Search</label>
    <input id="search-inp" type="text" placeholder="Incident #, date, address, incident type, or IC name…" autocomplete="off" oninput="doSearch()"/>
    <div class="search-meta" id="search-meta"></div>
  </div>

  <div class="table-wrap" id="table-wrap" style="display:none">
    <div class="table-hdr">Reports</div>
    <div id="results"></div>
  </div>
</div>

<script>
let allReports = [];
const DEFAULT_URL = 'https://aurelius-reports-api.ryanhultz.workers.dev/reports';

function showStatus(msg, type='ok') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

function getWorkerUrl() {
  return localStorage.getItem('afr_reports_url') || DEFAULT_URL;
}

function showConnBox() {
  document.getElementById('conn-box').style.display = 'block';
  document.getElementById('worker-url').value = getWorkerUrl();
}

function connect() {
  const url = document.getElementById('worker-url').value.trim();
  if (!url) { showStatus('Enter the Worker URL.', 'err'); return; }
  localStorage.setItem('afr_reports_url', url);
  document.getElementById('conn-box').style.display = 'none';
  loadReports();
}

async function loadReports() {
  const url = getWorkerUrl();
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allReports = await r.json();
    if (!Array.isArray(allReports)) throw new Error('Unexpected response');
    allReports.sort((a,b) => (b.saved_at||0) - (a.saved_at||0));
    document.getElementById('search-box').style.display = 'block';
    document.getElementById('table-wrap').style.display = 'block';
    showStatus(`✓ Loaded ${allReports.length} report${allReports.length===1?'':'s'}`);
    doSearch();
  } catch (err) {
    showStatus('Could not load report history: ' + err.message, 'err');
    showConnBox();
  }
}

function doSearch() {
  const q = document.getElementById('search-inp').value.trim().toLowerCase();
  const meta = document.getElementById('search-meta');

  let matches = allReports;
  if (q) {
    matches = allReports.filter(r => {
      const hay = [r.run_num, r.date, r.address, r.neris_type, r.ic_name]
        .map(x => (x||'').toLowerCase()).join(' | ');
      return hay.indexOf(q) >= 0;
    });
    meta.textContent = `${matches.length} of ${allReports.length} reports match "${q}"`;
  } else {
    meta.textContent = `${allReports.length} total reports`;
  }
  renderResults(matches);
}

function esc(s){return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderResults(list) {
  const el = document.getElementById('results');
  if (!list.length) {
    el.innerHTML = '<div class="empty">No reports match your search.</div>';
    return;
  }
  el.innerHTML = list.map(r => {
    const when = r.saved_at ? new Date(r.saved_at).toLocaleString() : '';
    return `<div class="result">
      <div class="r-main">
        <div class="r-title">
          <span>${esc(r.run_num) || '(no incident #)'}</span>
          ${r.neris_type ? `<span class="r-badge">${esc(r.neris_type)}</span>` : ''}
        </div>
        <div class="r-sub">${[esc(r.date)||'no date', esc(r.address), r.ic_name?('IC '+esc(r.ic_name)):'', when].filter(Boolean).join(' &nbsp;·&nbsp; ')}</div>
      </div>
      <button class="open-btn" onclick="viewReport('${esc(r.id)}')">View</button>
    </div>`;
  }).join('');
}

async function viewReport(id) {
  const url = getWorkerUrl();
  try {
    const r = await fetch(url + '?id=' + encodeURIComponent(id));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const rep = await r.json();
    showDetail(rep);
  } catch (err) {
    showStatus('Could not open that report: ' + err.message, 'err');
  }
}

function showDetail(rep) {
  document.getElementById('modal-title').textContent = 'Incident #' + (rep.runNum || '—');
  const rows = [
    ['Date', rep.date],
    ['Dispatched', rep.disp],
    ['In Quarters', rep.inQ],
    ['Address', rep.address],
    ['Incident Type', rep.nerisType],
    ['Response Mode', rep.responseMode],
    ['Disposition', rep.disposition],
  ].filter(([,v]) => v);

  let html = rows.map(([k,v]) => `<div class="row"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('');
  if (rep.narrative) {
    html += `<div class="narr"><strong>Narrative</strong><br>${esc(rep.narrative)}</div>`;
  }
  document.getElementById('modal-body').innerHTML = html || '<div class="empty">No details available.</div>';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Boot
loadReports();
</script>
</body>
</html>
